backend:
  name: github
  repo: mcd2023/pianoshabi.com
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Sayfalar"
    files:
      - label: "Ana Sayfa"
        name: "home"
        file: "index.html"
        fields:
          - { label: "Başlık", name: "title", widget: "string" }
          - { label: "Açıklama", name: "description", widget: "text" }