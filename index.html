<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PianoShabi | Piano Lessons Tel Aviv</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LANGUAGE -->
  <div class="lang-switch">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('he')">HE</button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <h1 data-key="heroTitle"></h1>
    <p data-key="heroDesc"></p>
    <p data-key="heroSub"></p>

    <a class="btn" id="whatsappBtn" href="#">
      WhatsApp
    </a>
  </section>

  <!-- WHY -->
  <section>
    <h2 data-key="whyTitle"></h2>

    <ul>
      <li data-key="why1"></li>
      <li data-key="why2"></li>
      <li data-key="why3"></li>
      <li data-key="why4"></li>
    </ul>
  </section>

  <!-- VIDEO -->
  <section class="videos">
    <h2 data-key="videoTitle"></h2>

    <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@piano.shabi/video/7505372237034245384"
      data-video-id="7505372237034245384"
      style="max-width: 605px;min-width: 325px;">
      <section></section>
    </blockquote>
  </section>

  <script async src="https://www.tiktok.com/embed.js"></script>

  <!-- LOCATION -->
  <section>
    <h2 data-key="locTitle"></h2>
    <p data-key="locText1"></p>
    <p data-key="locText2"></p>
  </section>

  <!-- CTA -->
  <section class="cta">
    <h2 data-key="ctaTitle"></h2>
    <p data-key="ctaDesc"></p>

    <a class="btn" id="ctaBtn" href="#">
      Start Now
    </a>
  </section>

  <script src="script.js"></script>
</body>
</html>
